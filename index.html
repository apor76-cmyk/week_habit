<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weekly Tracker App</title>

<style>
:root{
    --bg:#eef2ff;
    --card:#ffffff;
    --text:#111827;
    --accent:#6366f1;
    --line:rgba(0,0,0,0.08);
    --today:rgba(99,102,241,0.12);
}
body.dark{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#e5e7eb;
    --line:rgba(255,255,255,0.08);
    --today:rgba(99,102,241,0.25);
}

body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
    background:var(--bg);
    color:var(--text);
}

.app{
    max-width:1024px;
    margin:auto;
    padding:20px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

.controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

button,input{
    padding:10px 14px;
    border-radius:12px;
    border:none;
    font-size:14px;
}

button{
    background:var(--accent);
    color:white;
    cursor:pointer;
}

.card{
    background:var(--card);
    border-radius:16px;
    padding:15px;
    box-shadow:0 6px 20px rgba(0,0,0,0.08);
    border:1px solid var(--line);
}

table{
    width:100%;
    border-collapse:collapse;
}

th,td{
    padding:10px;
    text-align:center;
    border-bottom:1px solid var(--line);
}

thead th{
    background:var(--accent);
    color:#fff;
}

.todayCol{
    background:var(--today);
}

.task{text-align:left;font-weight:600}
.cell{cursor:pointer;font-size:18px;font-weight:bold}
.o{color:#22c55e}
.x{color:#ef4444}

.deleteBtn{
    background:#ef4444;
    padding:6px 10px;
    border-radius:8px;
    font-size:12px;
}

.weekLabel{
    margin-bottom:10px;
    font-weight:600;
    padding-bottom:8px;
    border-bottom:1px solid var(--line);
}
</style>
</head>
<body>

<div class="app">

<div class="header">
<div>📅 Weekly Tracker</div>
<div class="controls">
<input id="taskInput" placeholder="목록 추가">
<button onclick="addTask()">추가</button>
<button onclick="prevWeek()">◀</button>
<button onclick="nextWeek()">▶</button>
<button onclick="goToday()">오늘</button>
<button onclick="toggleDark()">🌙</button>
<button onclick="backup()">백업</button>
<input type="file" onchange="restore(event)">
</div>
</div>

<div class="card">
<div id="weekLabel" class="weekLabel"></div>

<table>
<thead>
<tr>
<th>목록</th>
<th>월</th>
<th>연</th>
<th>%</th>
<th id="h0">월</th>
<th id="h1">화</th>
<th id="h2">수</th>
<th id="h3">목</th>
<th id="h4">금</th>
<th id="h5">토</th>
<th id="h6">일</th>
<th>삭제</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>
</div>

<script>
const DAYS=7
let weekOffset=0
let store=JSON.parse(localStorage.getItem("trackerApp")||"[]")

const todayIndex=(new Date().getDay()+6)%7

function weekKey(){
    const d=new Date()
    d.setDate(d.getDate()+weekOffset*7)
    const y=d.getFullYear()
    const w=Math.ceil((((d-new Date(y,0,1))/86400000)+1)/7)
    return `${y}-W${w}`
}

function save(){localStorage.setItem("trackerApp",JSON.stringify(store))}

function addTask(){
    const name=document.getElementById("taskInput").value.trim()
    if(!name) return
    store.push({name,records:{},monthly:0,yearly:0})
    document.getElementById("taskInput").value=""
    save();render()
}

function deleteTask(i){
    if(!confirm("삭제할까요?")) return
    store.splice(i,1)
    save();render()
}

function toggle(i,d){
    const wk=weekKey()
    if(!store[i].records[wk]) store[i].records[wk]=Array(DAYS).fill(null)
    let v=store[i].records[wk][d]
    if(v==="O"){store[i].records[wk][d]="X";store[i].monthly--;store[i].yearly--}
    else if(v==="X"){store[i].records[wk][d]=null}
    else{store[i].records[wk][d]="O";store[i].monthly++;store[i].yearly++}
    save();render()
}

function rate(t){
    const arr=Object.values(t.records).flat()
    const total=arr.filter(v=>v!==null).length
    const ok=arr.filter(v=>v==="O").length
    return total?Math.round(ok/total*100)+"%":"0%"
}

function render(){
    const wk=weekKey()
    document.getElementById("weekLabel").innerText="주차: "+wk

    // 헤더 오늘 강조
    for(let i=0;i<7;i++){
        document.getElementById("h"+i).classList.toggle("todayCol",i===todayIndex)
    }

    const tbody=document.getElementById("tbody")
    tbody.innerHTML=""

    store.forEach((t,i)=>{
        if(!t.records[wk]) t.records[wk]=Array(DAYS).fill(null)

        let tr=document.createElement("tr")
        let html=`
        <td class="task">${t.name}</td>
        <td>${t.monthly}</td>
        <td>${t.yearly}</td>
        <td>${rate(t)}</td>
        `
        t.records[wk].forEach((v,d)=>{
            let cls=(v==="O"?"o":v==="X"?"x":"")
            let todayClass=d===todayIndex?"todayCol":""
            html+=`<td class="cell ${cls} ${todayClass}" onclick="toggle(${i},${d})">${v??""}</td>`
        })
        html+=`<td><button class="deleteBtn" onclick="deleteTask(${i})">삭제</button></td>`
        tr.innerHTML=html
        tbody.appendChild(tr)
    })
}

function nextWeek(){weekOffset++;render()}
function prevWeek(){weekOffset--;render()}
function goToday(){weekOffset=0;render()}
function toggleDark(){document.body.classList.toggle("dark")}

function backup(){
    const blob=new Blob([JSON.stringify(store)],{type:"application/json"})
    const a=document.createElement("a")
    a.href=URL.createObjectURL(blob)
    a.download="tracker-backup.json"
    a.click()
}

function restore(e){
    const file=e.target.files[0]
    if(!file) return
    const reader=new FileReader()
    reader.onload=()=>{store=JSON.parse(reader.result);save();render()}
    reader.readAsText(file)
}

render()
</script>

</body>
</html>
