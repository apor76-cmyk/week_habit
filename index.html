<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Weekly Tracker</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700&display=swap');

:root {
  --bg: #f0f4ff;
  --card: #ffffff;
  --text: #111827;
  --sub: #6b7280;
  --accent: #6366f1;
  --accent2: #818cf8;
  --danger: #ef4444;
  --success: #22c55e;
  --line: rgba(0,0,0,0.07);
  --today-bg: rgba(99,102,241,0.10);
  --shadow: 0 4px 24px rgba(99,102,241,0.10);
  --radius: 16px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}
body.dark {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --sub: #94a3b8;
  --line: rgba(255,255,255,0.07);
  --today-bg: rgba(99,102,241,0.22);
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans KR', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-top: var(--safe-top);
  padding-bottom: calc(var(--safe-bottom) + 16px);
  padding-left: var(--safe-left);
  padding-right: var(--safe-right);
  transition: background 0.3s, color 0.3s;
}

/* ── App Wrapper ── */
.app {
  max-width: 960px;
  margin: 0 auto;
  padding: 16px 14px;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  gap: 10px;
}
.header-title {
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.header-actions {
  display: flex;
  gap: 6px;
  align-items: center;
}

/* ── Icon Buttons (header) ── */
.icon-btn {
  width: 40px;
  height: 40px;
  border-radius: 12px;
  background: var(--card);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  cursor: pointer;
  color: var(--text);
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.icon-btn:active { transform: scale(0.93); }

/* ── Week Nav Bar ── */
.week-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--card);
  border-radius: var(--radius);
  padding: 10px 14px;
  margin-bottom: 12px;
  box-shadow: var(--shadow);
  border: 1px solid var(--line);
  gap: 8px;
}
.week-nav-btn {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--bg);
  border: 1px solid var(--line);
  font-size: 16px;
  cursor: pointer;
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.week-nav-btn:active { background: var(--today-bg); }
.week-label-wrap {
  flex: 1;
  text-align: center;
}
.week-label {
  font-size: 15px;
  font-weight: 700;
  color: var(--accent);
}
.week-dates {
  font-size: 11px;
  color: var(--sub);
  margin-top: 1px;
}
.today-btn {
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 10px;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}

/* ── Add Task Bar ── */
.add-bar {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.add-bar input {
  flex: 1;
  padding: 12px 14px;
  border-radius: var(--radius);
  border: 1.5px solid var(--line);
  background: var(--card);
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
  box-shadow: var(--shadow);
  min-width: 0;
}
.add-bar input:focus { border-color: var(--accent); }
.add-bar input::placeholder { color: var(--sub); }
.add-btn {
  padding: 12px 18px;
  border-radius: var(--radius);
  background: var(--accent);
  color: white;
  border: none;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--shadow);
  -webkit-tap-highlight-color: transparent;
}
.add-btn:active { opacity: 0.85; }

/* ── Card ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  border: 1px solid var(--line);
  box-shadow: var(--shadow);
  overflow: hidden;
  margin-bottom: 12px;
}

/* ── Table scroll wrapper ── */
.table-wrap {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  /* subtle scroll indicator */
  background:
    linear-gradient(to right, var(--card) 20px, transparent 20px),
    linear-gradient(to left, var(--card) 20px, transparent 20px),
    radial-gradient(ellipse at left, rgba(0,0,0,.12) 0%, transparent 70%) 0 50%,
    radial-gradient(ellipse at right, rgba(0,0,0,.12) 0%, transparent 70%) 100% 50%;
  background-size: 20px 100%, 20px 100%, 10px 60%, 10px 60%;
  background-attachment: local, local, scroll, scroll;
  background-repeat: no-repeat;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 580px; /* 최소 너비 보장 — 가로 스크롤 트리거 */
}

th, td {
  padding: 10px 8px;
  text-align: center;
  border-bottom: 1px solid var(--line);
  font-size: 13px;
  white-space: nowrap;
}

thead th {
  background: var(--accent);
  color: white;
  font-weight: 700;
  font-size: 12px;
  padding: 11px 8px;
  position: sticky;
  top: 0;
  z-index: 2;
}
thead th:first-child {
  text-align: left;
  position: sticky;
  left: 0;
  z-index: 3;
  min-width: 90px;
}

/* 목록 셀 sticky */
td.task-cell {
  text-align: left;
  font-weight: 600;
  font-size: 13px;
  position: sticky;
  left: 0;
  background: var(--card);
  z-index: 1;
  border-right: 1px solid var(--line);
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* stat cells */
td.stat {
  font-size: 12px;
  color: var(--sub);
  font-weight: 600;
  min-width: 38px;
}

/* 퍼센트 */
td.pct {
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
}

/* 오늘 컬럼 강조 */
th.today-col { background: rgba(255,255,255,0.2) !important; position: relative; }
th.today-col::after {
  content: '';
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 4px; height: 4px;
  border-radius: 50%;
  background: white;
}
td.today-col { background: var(--today-bg); }

/* 체크 셀 */
td.cell {
  cursor: pointer;
  font-size: 16px;
  font-weight: 800;
  min-width: 42px;
  height: 44px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.12s;
  border-radius: 0;
}
td.cell:active { opacity: 0.6; }
td.cell.o { color: var(--success); }
td.cell.x { color: var(--danger); }

/* 삭제 버튼 */
td.del-td { padding: 6px; min-width: 48px; }
.del-btn {
  background: var(--danger);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 6px 10px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.del-btn:active { opacity: 0.8; }

/* 토요일 헤더 색상 */
th.sat { background: rgba(255,255,255,0.15) !important; color: #bfdbfe !important; }
th.sun { background: rgba(255,255,255,0.15) !important; color: #fca5a5 !important; }

/* tbody 마지막 행 border 제거 */
tbody tr:last-child td { border-bottom: none; }

/* ── 빈 상태 ── */
.empty-state {
  padding: 40px 20px;
  text-align: center;
  color: var(--sub);
  font-size: 14px;
}
.empty-state .emoji { font-size: 36px; margin-bottom: 10px; }

/* ── 하단 유틸 버튼 ── */
.util-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.util-btn {
  flex: 1;
  min-width: 80px;
  padding: 11px 10px;
  border-radius: var(--radius);
  background: var(--card);
  border: 1px solid var(--line);
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.15s;
}
.util-btn:active { background: var(--today-bg); }

/* 파일 인풋 숨기기 */
#fileInput { display: none; }

/* ── 반응형 ── */
@media (max-width: 480px) {
  .app { padding: 12px 10px; }
  .header-title { font-size: 17px; }
  th, td { padding: 9px 6px; font-size: 12px; }
  td.cell { font-size: 15px; min-width: 38px; height: 42px; }
  table { min-width: 520px; }
}
</style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <div class="header">
    <div class="header-title">📅 Weekly Tracker</div>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleDark()" title="다크모드">🌙</button>
    </div>
  </div>

  <!-- Week Navigation -->
  <div class="week-nav">
    <button class="week-nav-btn" onclick="prevWeek()">&#8249;</button>
    <div class="week-label-wrap">
      <div class="week-label" id="weekLabel">—</div>
      <div class="week-dates" id="weekDates">—</div>
    </div>
    <button class="today-btn" onclick="goToday()">오늘</button>
    <button class="week-nav-btn" onclick="nextWeek()">&#8250;</button>
  </div>

  <!-- Add Task -->
  <div class="add-bar">
    <input id="taskInput" placeholder="새 항목 입력..." maxlength="20"
      onkeydown="if(event.key==='Enter') addTask()">
    <button class="add-btn" onclick="addTask()">+ 추가</button>
  </div>

  <!-- Table Card -->
  <div class="card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>목록</th>
            <th>월누계</th>
            <th>연누계</th>
            <th>달성률</th>
            <th id="h0">월</th>
            <th id="h1">화</th>
            <th id="h2">수</th>
            <th id="h3">목</th>
            <th id="h4">금</th>
            <th id="h5" class="sat">토</th>
            <th id="h6" class="sun">일</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="emptyState" class="empty-state" style="display:none">
      <div class="emoji">📋</div>
      <div>항목을 추가해 주세요</div>
    </div>
  </div>

  <!-- Utility Buttons -->
  <div class="util-bar">
    <button class="util-btn" onclick="backup()">💾 백업</button>
    <button class="util-btn" onclick="document.getElementById('fileInput').click()">📂 복원</button>
    <input type="file" id="fileInput" accept=".json" onchange="restore(event)">
  </div>

</div>

<script>
const DAYS = 7
let weekOffset = 0
let store = JSON.parse(localStorage.getItem('trackerApp') || '[]')

const todayDOW = (new Date().getDay() + 6) % 7 // 0=월 ~ 6=일

function getMonday(offset) {
  const d = new Date()
  const day = d.getDay()
  const diff = (day === 0 ? -6 : 1 - day) // 이번주 월요일
  d.setDate(d.getDate() + diff + offset * 7)
  d.setHours(0,0,0,0)
  return d
}

function weekKey() {
  const mon = getMonday(weekOffset)
  const y = mon.getFullYear()
  const jan1 = new Date(y, 0, 1)
  const w = Math.ceil(((mon - jan1) / 86400000 + jan1.getDay() + 1) / 7)
  return `${y}-W${String(w).padStart(2,'0')}`
}

function formatDate(d) {
  return `${d.getMonth()+1}/${d.getDate()}`
}

function save() { localStorage.setItem('trackerApp', JSON.stringify(store)) }

function addTask() {
  const el = document.getElementById('taskInput')
  const name = el.value.trim()
  if (!name) return
  store.push({ name, records: {}, monthly: 0, yearly: 0 })
  el.value = ''
  save(); render()
}

function deleteTask(i) {
  if (!confirm(`"${store[i].name}"을(를) 삭제할까요?`)) return
  store.splice(i, 1)
  save(); render()
}

function toggle(i, d) {
  const wk = weekKey()
  if (!store[i].records[wk]) store[i].records[wk] = Array(DAYS).fill(null)
  let v = store[i].records[wk][d]
  if (v === 'O') {
    store[i].records[wk][d] = 'X'
    store[i].monthly = Math.max(0, (store[i].monthly||0) - 1)
    store[i].yearly  = Math.max(0, (store[i].yearly||0) - 1)
  } else if (v === 'X') {
    store[i].records[wk][d] = null
  } else {
    store[i].records[wk][d] = 'O'
    store[i].monthly = (store[i].monthly||0) + 1
    store[i].yearly  = (store[i].yearly||0) + 1
  }
  save(); render()
}

function rate(t) {
  const arr = Object.values(t.records).flat()
  const total = arr.filter(v => v !== null).length
  const ok = arr.filter(v => v === 'O').length
  return total ? Math.round(ok / total * 100) + '%' : '0%'
}

function render() {
  const wk = weekKey()
  const mon = getMonday(weekOffset)
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6)

  // 주차 & 날짜 범위
  document.getElementById('weekLabel').textContent = `📆 ${wk}`
  document.getElementById('weekDates').textContent =
    `${formatDate(mon)} ~ ${formatDate(sun)}`

  // 헤더 날짜 표시 + 오늘 강조
  for (let i = 0; i < 7; i++) {
    const th = document.getElementById('h' + i)
    const day = new Date(mon); day.setDate(mon.getDate() + i)
    const dayNames = ['월','화','수','목','금','토','일']
    th.innerHTML = `${dayNames[i]}<br><span style="font-size:10px;font-weight:400;opacity:.85">${formatDate(day)}</span>`
    th.classList.toggle('today-col', i === todayDOW && weekOffset === 0)
    if (i < 5) th.classList.remove('sat','sun')
  }

  const tbody = document.getElementById('tbody')
  tbody.innerHTML = ''

  document.getElementById('emptyState').style.display = store.length ? 'none' : 'block'

  store.forEach((t, i) => {
    if (!t.records[wk]) t.records[wk] = Array(DAYS).fill(null)

    const tr = document.createElement('tr')
    let html = `
      <td class="task-cell" title="${t.name}">${t.name}</td>
      <td class="stat">${t.monthly ?? 0}</td>
      <td class="stat">${t.yearly ?? 0}</td>
      <td class="pct">${rate(t)}</td>
    `
    t.records[wk].forEach((v, d) => {
      const cls = v === 'O' ? 'o' : v === 'X' ? 'x' : ''
      const todayCls = (d === todayDOW && weekOffset === 0) ? 'today-col' : ''
      const icon = v === 'O' ? '●' : v === 'X' ? '✕' : ''
      html += `<td class="cell ${cls} ${todayCls}" onclick="toggle(${i},${d})">${icon}</td>`
    })
    html += `<td class="del-td"><button class="del-btn" onclick="deleteTask(${i})">삭제</button></td>`
    tr.innerHTML = html
    tbody.appendChild(tr)
  })
}

function nextWeek() { weekOffset++; render() }
function prevWeek() { weekOffset--; render() }
function goToday() { weekOffset = 0; render() }
function toggleDark() { document.body.classList.toggle('dark') }

function backup() {
  const blob = new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = `tracker-backup-${new Date().toISOString().slice(0,10)}.json`
  a.click()
}

function restore(e) {
  const file = e.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = () => {
    try {
      store = JSON.parse(reader.result)
      save(); render()
      alert('복원 완료!')
    } catch {
      alert('파일이 올바르지 않습니다.')
    }
  }
  reader.readAsText(file)
  e.target.value = '' // 동일 파일 재선택 허용
}

render()
</script>
</body>
</html>
